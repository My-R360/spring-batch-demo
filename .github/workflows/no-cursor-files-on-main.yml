# Ensure pull requests into main do not leave Cursor / local-agent paths in the merged tree.
name: No Cursor agent files on main

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - name: Forbid agent-only paths in merge result
        run: |
          set -euo pipefail
          BAD=0
          if [ -d .cursor ]; then
            echo "::error::Merged tree contains .cursor/ — remove it from the PR branch before merging to main."
            BAD=1
          fi
          if [ -f PROMPTS.md ]; then
            echo "::error::Merged tree contains PROMPTS.md — remove it from the PR branch before merging to main."
            BAD=1
          fi
          if [ -f AGENTS.md ]; then
            echo "::error::Merged tree contains AGENTS.md — remove it from the PR branch before merging to main."
            BAD=1
          fi
          exit "$BAD"
