spring.application.name=spring-batch-demo

# Phase 3: RabbitMQ for durable import commands (start broker: see RUNBOOK).
app.messaging.customer-import.enabled=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Dev profile: initialize schemas on startup, but don't fail on "already exists"
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
# schema.sql uses Oracle PL/SQL blocks with many ";". Default splitting breaks them.
# Delimiter must NOT start with "--" or Spring's script reader drops that line as a comment.
spring.sql.init.separator=^^^ END ORACLE DDL ^^^

spring.batch.jdbc.initialize-schema=always
spring.batch.jdbc.platform=oracle

# Same Oracle defaults; override if needed
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/XEPDB1
spring.datasource.username=batch_user
spring.datasource.password=batch_pass
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Local stress profile: keep Rabbit as the real buffer.
# Two concurrent jobs is more reliable on this laptop than three; it leaves more room
# for Spring Batch metadata writes, correlation inserts, and status/report queries.
app.customer-import.execution.max-concurrent-jobs=2

# Widen listener retries so transient launch/repository pressure is less likely to dead-letter
# a command before a batch slot or JDBC path clears.
app.messaging.customer-import.retry-max-attempts=6
app.messaging.customer-import.retry-initial-interval-ms=2000
app.messaging.customer-import.retry-max-interval-ms=15000

spring.batch.job.enabled=false

# Logs to help debug schema init + batch execution
logging.level.org.springframework.jdbc.datasource.init=DEBUG
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.batch=INFO
