spring.application.name=spring-batch-demo-amqp-it

app.messaging.customer-import.enabled=true
spring.autoconfigure.exclude=

spring.datasource.url=jdbc:h2:mem:amqpIt;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2-import-audit-it.sql

spring.batch.jdbc.initialize-schema=embedded
spring.batch.jdbc.platform=h2
spring.batch.job.enabled=false

# Host/port overridden by Testcontainers in CustomerImportAmqpEndToEndIntegrationTest
spring.rabbitmq.host=127.0.0.1
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
