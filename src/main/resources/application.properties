spring.application.name=spring-batch-demo

# Phase 3: RabbitMQ is off unless a profile enables it (see application-dev.properties).
app.messaging.customer-import.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Local-only staging for external CSV files before RabbitMQ/job launch.
# The directory must be on the runtime classpath. With mvn spring-boot:run, target/classes is on the classpath.
app.customer-import.local-staging.classpath-directory=target/classes/customer-imports
app.customer-import.local-staging.classpath-location-prefix=customer-imports

# Default profile: don't auto-create tables (safer for prod).
spring.batch.jdbc.initialize-schema=never
spring.batch.jdbc.platform=oracle
spring.sql.init.mode=never

# Oracle (default). Override via env vars if needed.
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/XEPDB1
spring.datasource.username=batch_user
spring.datasource.password=batch_pass
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Job runs only when REST endpoint is called
spring.batch.job.enabled=false
